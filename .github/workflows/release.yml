name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            bun_target: bun-linux-x64-modern
            archive_suffix: linux-x64
            binary_name: bay
          - label: linux-arm64
            bun_target: bun-linux-arm64
            archive_suffix: linux-arm64
            binary_name: bay
          - label: macos-x64
            bun_target: bun-darwin-x64-modern
            archive_suffix: macos-x64
            binary_name: bay
          - label: macos-arm64
            bun_target: bun-darwin-arm64
            archive_suffix: macos-arm64
            binary_name: bay

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Derive release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build standalone binary
        run: |
          mkdir -p dist
          bun build ./index.ts \
            --compile \
            --target=${{ matrix.bun_target }} \
            --outfile=./dist/${{ matrix.binary_name }}

      - name: Package archive and checksum
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          ARCHIVE="bay-${VERSION}-${{ matrix.archive_suffix }}.tar.gz"
          (
            cd dist
            tar -czf "${ARCHIVE}" "${{ matrix.binary_name }}"
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          )

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive_suffix }}
          path: |
            dist/bay-*.tar.gz
            dist/bay-*.tar.gz.sha256

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          generate_release_notes: true
          files: release-artifacts/*
